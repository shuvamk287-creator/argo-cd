apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-cost-detective

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-cost-detective

  template:
    metadata:
      labels:
        app: ai-cost-detective

    spec:
      containers:
      - name: ai-cost-detective

       image: shuv922/ai-cost-detective:cc9af4078865ab4917bf9a878c44a3cc4a0681cf
       imagePullPolicy: Always

        ports:
        - containerPort: 8000
