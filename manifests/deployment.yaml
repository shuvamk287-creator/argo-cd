apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-cost-detective

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-cost-detective

  template:
    metadata:
      labels:
        app: ai-cost-detective

    spec:
      containers:
      - name: ai-cost-detective

       image: shuv922/ai-cost-detective:9f6865ea548921df384e56b87b17fd424cd9b8f5
       imagePullPolicy: Always

        ports:
        - containerPort: 8000
