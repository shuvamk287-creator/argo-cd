metadata:
  name: ai-cost-detective

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-cost-detective

  template:
    metadata:
      labels:
        app: ai-cost-detective

    spec:
      containers:
      - name: ai-cost-detective

      containers:
      - name: ai-cost-detective
        image: shuv922/ai-cost-detective:fd8acb808ab2e5cea9f082a09cf683443c51e65a
        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        ports:
        - containerPort: 8000
