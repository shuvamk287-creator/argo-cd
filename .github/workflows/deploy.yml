name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t shuv922/ai-cost-detective:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push shuv922/ai-cost-detective:${{ github.sha }}

      - name: Update Deployment YAML
        run: |
          sed -i "s|image: .*|image: shuv922/ai-cost-detective:${{ github.sha }}|g" manifests/dep
