name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t shuv922/ai-cost-detective:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push shuv922/ai-cost-detective:${{ github.sha }}

      - name: Update Deployment YAML
        run: |
          sed -i "s|image: .*|image: shuv922/ai-cost-detective:${{ github.sha }}|g" manifests/deployment.yaml

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add manifests/deployment.yaml

          git commit -m "Update image to ${{ github.sha }}" || exit 0

          git push
